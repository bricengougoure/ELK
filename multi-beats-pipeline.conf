# ============================================================
# PIPELINE LOGSTASH - Multi-Beats SIEM
# /etc/logstash/conf.d/multi-beats-pipeline.conf
# ============================================================

input {
  beats {
    port => 5044
    ssl_enabled => false
  }
}

# ============================================================
filter {

  # ---- FILEBEAT - Logs SSH ----
  if [log_type] == "ssh" or [log][file][path] =~ /auth\.log/ {
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host_name} sshd\[%{NUMBER:pid}\]: Failed password for %{USERNAME:user.name} from %{IP:source.ip} port %{NUMBER:source.port}",
          "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host_name} sshd\[%{NUMBER:pid}\]: Accepted password for %{USERNAME:user.name} from %{IP:source.ip} port %{NUMBER:source.port}"
        ]
      }
    }
    if [message] =~ /Failed/ {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][outcome]"  => "failure"
          "[event][severity]" => "3"
        }
        add_tag => ["ssh_brute_force_candidate"]
      }
    }
    if [message] =~ /Accepted/ {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][outcome]"  => "success"
          "[event][severity]" => "1"
        }
      }
    }
    # Enrichissement GeoIP
    if [source.ip] {
      geoip {
        source => "source.ip"
        target => "source.geo"
      }
    }
  }

  # ---- WINLOGBEAT - Event ID 4625 (Echec Windows) ----
  if [agent][type] == "winlogbeat" {
    if [winlog][event_id] == 4625 {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][outcome]"  => "failure"
          "[event][severity]" => "3"
        }
        add_tag => ["windows_logon_failure"]
      }
    }
    if [winlog][event_id] == 4624 {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][outcome]"  => "success"
        }
        add_tag => ["windows_logon_success"]
      }
    }
    if [winlog][event_id] == 4732 {
      mutate {
        add_field => {
          "[event][category]" => "iam"
          "[event][outcome]"  => "success"
          "[event][severity]" => "5"
        }
        add_tag => ["privilege_escalation_candidate"]
      }
    }
  }

  # ---- AUDITBEAT - Modifications fichiers sensibles ----
  if [agent][type] == "auditbeat" {
    if [file][path] =~ /\/etc\/(passwd|shadow|sudoers)/ {
      mutate {
        add_field => {
          "[event][category]" => "file"
          "[event][severity]" => "5"
        }
        add_tag => ["sensitive_file_modified"]
      }
    }
  }

  # ---- PACKETBEAT - Détection DNS suspect ----
  if [agent][type] == "packetbeat" and [type] == "dns" {
    if [dns][response_code] == "NXDOMAIN" {
      mutate {
        add_field => {
          "[event][category]" => "network"
          "[event][severity]" => "2"
        }
        add_tag => ["dns_nxdomain"]
      }
    }
  }

  # ---- METRICBEAT - CPU anormal (cryptomining) ----
  if [agent][type] == "metricbeat" {
    if [system][cpu][total][pct] and [system][cpu][total][pct] > 0.9 {
      mutate {
        add_tag => ["high_cpu_alert"]
        add_field => { "[event][severity]" => "4" }
      }
    }
  }

  # Nettoyage global
  mutate {
    remove_field => ["@version"]
  }
}

# ============================================================
output {
  elasticsearch {
    hosts    => ["https://127.0.0.1:9200"]
    user     => "logstash_internal"
    password => "LogstashP@ss2026!"
    ssl_enabled => true
    ssl_certificate_authorities => ["/etc/logstash/certs/http_ca.crt"]

    # Index dynamique selon le type de Beat
    index => "siem-%{[agent][type]}-%{+YYYY.MM.dd}"
  }
}
