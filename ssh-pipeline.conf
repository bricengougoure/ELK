input {
  file {
    path => "/var/log/auth.log"          # Debian/Ubuntu
    # path => "/var/log/secure"          # RHEL/CentOS/Fedora
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb_ssh"
    tags => ["ssh"]
  }
}

filter {
  grep {
    match => { "message" => "sshd" }
  }

  grok {
    match => {
      "message" => [
        "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host} sshd\[%{NUMBER:pid}\]: Accepted %{WORD:auth_method} for %{USER:username} from %{IP:src_ip} port %{NUMBER:src_port}",
        "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host} sshd\[%{NUMBER:pid}\]: Failed %{WORD:auth_method} for %{USER:username} from %{IP:src_ip} port %{NUMBER:src_port}",
        "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host} sshd\[%{NUMBER:pid}\]: Invalid user %{USER:username} from %{IP:src_ip} port %{NUMBER:src_port}",
        "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host} sshd\[%{NUMBER:pid}\]: Disconnected from %{IP:src_ip} port %{NUMBER:src_port}",
        "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host} sshd\[%{NUMBER:pid}\]: %{GREEDYDATA:ssh_message}"
      ]
    }
  }

  date {
    match => [ "timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    target => "@timestamp"
  }

  if [message] =~ /Accepted/ {
    mutate { add_field => { "event_type" => "ssh_login_success" } }
  } else if [message] =~ /Failed/ {
    mutate { add_field => { "event_type" => "ssh_login_failure" } }
  } else if [message] =~ /Invalid user/ {
    mutate { add_field => { "event_type" => "ssh_invalid_user" } }
  } else if [message] =~ /Disconnected/ {
    mutate { add_field => { "event_type" => "ssh_disconnect" } }
  }

  mutate {
    remove_field => ["timestamp", "host"]
  }
}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "ssh-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "your_password"
  }

  stdout { codec => rubydebug }
}
