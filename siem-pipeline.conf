# ============================================================
# PIPELINE SIEM - Logstash
# Collecte, traitement et envoi vers Elasticsearch
# ============================================================

input {
  # Collecte via Beats (Filebeat, Winlogbeat, Auditbeat...)
  beats {
    port => 5044
    ssl_enabled => true
    ssl_certificate => "/etc/logstash/certs/logstash.crt"
    ssl_key         => "/etc/logstash/certs/logstash.key"
  }

  # Collecte Syslog (pare-feu, routeurs, etc.)
  syslog {
    port => 514
    type => "syslog"
  }

  # Collecte TCP générique
  tcp {
    port => 5000
    type => "tcp-input"
    codec => json_lines
  }
}

# ============================================================
filter {
  # --- Traitement des logs SSH ---
  if [type] == "syslog" or [log][file][path] =~ /auth\.log/ {
    grok {
      match => {
        "message" => [
          # Echec SSH
          "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host_name} sshd\[%{NUMBER:pid}\]: Failed password for %{USERNAME:user_name} from %{IP:source_ip} port %{NUMBER:source_port}",
          # Succès SSH
          "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:host_name} sshd\[%{NUMBER:pid}\]: Accepted password for %{USERNAME:user_name} from %{IP:source_ip} port %{NUMBER:source_port}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_ssh"]
    }

    # Enrichissement GeoIP
    if [source_ip] {
      geoip {
        source => "source_ip"
        target => "source.geo"
      }
    }

    # Normalisation ECS
    if [message] =~ /Failed password/ {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][outcome]"  => "failure"
          "[event][severity]" => "3"
        }
        add_tag => ["ssh_failed_auth"]
      }
    } else if [message] =~ /Accepted password/ {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][outcome]"  => "success"
          "[event][severity]" => "1"
        }
        add_tag => ["ssh_success_auth"]
      }
    }
  }

  # --- Traitement des logs Windows (Winlogbeat) ---
  if [agent][type] == "winlogbeat" {
    if [winlog][event_id] == 4625 {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][outcome]"  => "failure"
        }
        add_tag => ["windows_logon_failure"]
      }
    }
    if [winlog][event_id] == 4624 {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][outcome]"  => "success"
        }
        add_tag => ["windows_logon_success"]
      }
    }
  }

  # --- Nettoyage et normalisation globale ---
  mutate {
    remove_field => ["host", "@version"]
    convert => {
      "[event][severity]" => "integer"
    }
  }

  # Horodatage
  date {
    match => ["timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "ISO8601"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }
}

# ============================================================
output {
  # Envoi vers Elasticsearch
  elasticsearch {
    hosts    => ["https://127.0.0.1:9200"]
    user     => "logstash_internal"
    password => "****************!"
    ssl_enabled             => true
    ssl_certificate_authorities => ["/etc/logstash/certs/http_ca.crt"]
    index    => "siem-%{[event][category]}-%{+YYYY.MM.dd}"
    data_stream => false
  }

  # Debug en console (désactiver en production)
  # stdout { codec => rubydebug }
}
